# Config for dvhthomas/project-label-sync — bridges a GitHub Projects v2
# board's Status field with issue labels on this repo.
#
# How it works:
#   - Move a card to "In Progress" on the board → `in-progress` label appears
#     on the issue within ~15 minutes (cron schedule in
#     .github/workflows/label-sync.yml).
#   - Add the `in-progress` label by hand → the card moves to "In Progress"
#     on the board on the next run.
#
# NOTE: Status field option names below must match the board exactly
# (case-sensitive). The board has "In Progress" and "In Review" with capital
# P and R — not "In progress" / "In review".
#
# ⚠ Edit the project-url below to point at the correct Projects v2 board
# once you've created it. See docs/notes/dev-flow.md for the one-time
# setup steps.

project-url: https://github.com/users/dvhthomas/projects/3
field: Status
# Ideas is intentionally unmapped — no label is applied for raw ideas.
# Shaping IS mapped so the `shaping` label's first-applied timestamp marks
# the start of lead time (the moment work was "picked up"). Cycle time
# still starts later, at `in-progress` (when active work begins).
mapping:
  Shaping:
    - shaping
  "In Progress":
    - in-progress
  Blocked:
    - blocked
  "In Review":
    - in-review
  Shipped:
    - done
