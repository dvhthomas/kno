# Fly app config — committed alongside the Hello-Kno Dockerfile.
# `app` and `primary_region` were set by `fly launch --no-deploy` (2026-05-13);
# everything else was pre-pinned in this file and survived the regeneration.

app = 'kno'
primary_region = 'dfw'

[build]
# Uses the local Dockerfile. No buildpack.

[[mounts]]
  # Persistent volume — created via `fly volumes create kno_data --size 1 --region dfw`.
  # Used by later milestones (DB, KB ingest); empty for Hello-Kno.
  source = 'kno_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'  # Alpine cold-start + uv-installed deps need headroom
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
