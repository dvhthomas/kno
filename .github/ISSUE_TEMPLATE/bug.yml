name: Bug report
description: Something isn't working as documented
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: One-line summary
      description: What's broken, in a sentence.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error output, stack traces, or relevant log lines.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimum reproducible example, ideally as a copy-pasteable command sequence.
      placeholder: |
        1. uv sync
        2. KNO_FOO=bar uv run kno serve
        3. curl localhost:8000/api/health
        4. observe …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kno version / commit
      description: Output of `uv run kno version` or the git SHA.

  - type: textarea
    id: notes
    attributes:
      label: Anything else
