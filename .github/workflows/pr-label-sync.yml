# Auto-apply the correct lifecycle label to the issue referenced by a PR,
# based on PR state. Pairs with `dvhthomas/project-label-sync` which then
# moves the Projects v2 board card to the matching column.

name: PR-state label sync

on:
  pull_request:
    types: [opened, ready_for_review, converted_to_draft, reopened]

permissions:
  pull-requests: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const isDraft = pr.draft;

            const m = (pr.body || "").match(/(?:Closes|Fixes|Resolves)\s+#(\d+)/i);
            if (!m) {
              core.info("No `Closes #N` — skip (pr-validate enforces presence separately).");
              return;
            }
            const issueNum = parseInt(m[1], 10);

            let issue;
            try {
              const resp = await github.rest.issues.get({ ...context.repo, issue_number: issueNum });
              issue = resp.data;
            } catch (e) {
              if (e.status === 404) {
                core.info(`Issue #${issueNum} not found — skip.`);
                return;
              }
              throw e;
            }
            const labels = issue.labels.map(l => (typeof l === "string" ? l : l.name));
            const LIFECYCLE = ["shaping", "in-progress", "in-review"];

            // Decide target lifecycle label.
            let target;
            if (action === "opened" && isDraft) {
              if (LIFECYCLE.some(l => labels.includes(l))) {
                core.info(`#${issueNum} already has a lifecycle label; don't downgrade.`);
                return;
              }
              target = "shaping";
            } else if (action === "ready_for_review") {
              target = "in-review";
            } else if (action === "converted_to_draft") {
              target = "in-progress";
            } else if (action === "reopened") {
              target = isDraft ? "in-progress" : "in-review";
            } else {
              core.info(`Unhandled action: ${action}`);
              return;
            }

            if (labels.includes(target)) {
              core.info(`#${issueNum} already has \`${target}\` — idempotent no-op.`);
              return;
            }

            // Remove conflicting lifecycle labels first.
            for (const l of LIFECYCLE.filter(l => l !== target && labels.includes(l))) {
              await github.rest.issues.removeLabel({
                ...context.repo, issue_number: issueNum, name: l
              });
              core.info(`Removed \`${l}\` from #${issueNum}`);
            }

            await github.rest.issues.addLabels({
              ...context.repo, issue_number: issueNum, labels: [target]
            });
            core.info(`Added \`${target}\` to #${issueNum}`);
