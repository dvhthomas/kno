# Per AGENTS.md → Strict pre-merge review: every ready-for-review PR must
# carry a code-reviewer subagent comment with `**Verdict:** APPROVE` before
# the merge gate opens. Failure to find one blocks the check.
#
# Heading convention — STRICT: the marker comment's heading must be
# exactly `## Code-reviewer subagent` at the start of a line (the trailing
# `— pre-merge review` or similar is fine). Variations like emoji-prefixed
# (`## 🤖 Code-reviewer subagent`) or indented (`  ## Code-reviewer ...`)
# will not match and the gate will fail. Keep heading exact.
#
# Verdict convention — STRICT: a line containing exactly `**Verdict:**
# APPROVE` (no trailing text on that line). The skill template legend
# `APPROVE | REQUEST CHANGES` does NOT pass — it's not anchored to the
# whole line.
#
# Known limitations (intentional, see PR #13 review):
#   - `pull_request` runs the workflow from head SHA — a malicious head
#     could neuter the gate. Acceptable for solo-repo phase; Phase 3
#     (collaborator-readiness) will revisit `pull_request_target`.
#   - Edits to an APPROVE comment after the gate runs don't re-fire the
#     check. `synchronize` (each push) re-evaluates, so the stale window
#     is bounded by "no further pushes."

name: PR review gate

on:
  pull_request:
    types: [ready_for_review, synchronize]

permissions:
  pull-requests: read
  issues: read

jobs:
  review-comment-present:
    runs-on: ubuntu-latest
    # Drafts have no review obligation. Synchronize fires for draft PRs too,
    # so skip when still draft.
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { ...context.repo, issue_number: pr.number, per_page: 100 }
            );

            const MARKER = /^##\s+Code-reviewer subagent/m;
            // Anchored to whole line: kills false matches from the template's
            // "APPROVE | REQUEST CHANGES" legend and from "APPROVE_PENDING"-style
            // substrings.
            const APPROVE = /^\s*\*\*Verdict:\*\*\s*APPROVE\s*$/im;

            const reviewComments = comments
              .filter(c => MARKER.test(c.body || ""))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (reviewComments.length === 0) {
              core.setFailed(
                "No code-reviewer subagent comment found. Per AGENTS.md → " +
                "Strict pre-merge review: invoke `Agent(subagent_type=" +
                '"agent-skills:code-reviewer")` and post findings as a PR ' +
                "comment starting with `## Code-reviewer subagent`."
              );
              return;
            }

            const latest = reviewComments[0];
            if (!APPROVE.test(latest.body)) {
              core.setFailed(
                `Latest code-reviewer comment (${latest.html_url}) is missing ` +
                "`**Verdict:** APPROVE`. Address findings, re-invoke the " +
                "subagent, and post an updated review."
              );
              return;
            }

            core.info(`Code-reviewer APPROVE found at ${latest.html_url}`);
