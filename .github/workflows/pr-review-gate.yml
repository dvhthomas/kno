# Per AGENTS.md → Strict pre-merge review: every ready-for-review PR must
# carry a code-reviewer subagent comment with `**Verdict:** APPROVE` before
# the merge gate opens. Failure to find one blocks the check.
#
# The marker is `## Code-reviewer subagent` at the start of a line, anywhere
# in the comment body. This matches the convention used in PR #10's review
# comments.

name: PR review gate

on:
  pull_request:
    types: [ready_for_review, synchronize]

permissions:
  pull-requests: read
  issues: read

jobs:
  review-comment-present:
    runs-on: ubuntu-latest
    # Drafts have no review obligation. Synchronize fires for draft PRs too,
    # so skip when still draft.
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { ...context.repo, issue_number: pr.number, per_page: 100 }
            );

            const MARKER = /^##\s+Code-reviewer subagent/m;
            const APPROVE = /\*\*Verdict:\*\*\s*APPROVE/i;

            const reviewComments = comments
              .filter(c => MARKER.test(c.body || ""))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (reviewComments.length === 0) {
              core.setFailed(
                "No code-reviewer subagent comment found. Per AGENTS.md → " +
                "Strict pre-merge review: invoke `Agent(subagent_type=" +
                '"agent-skills:code-reviewer")` and post findings as a PR ' +
                "comment starting with `## Code-reviewer subagent`."
              );
              return;
            }

            const latest = reviewComments[0];
            if (!APPROVE.test(latest.body)) {
              core.setFailed(
                `Latest code-reviewer comment (${latest.html_url}) is missing ` +
                "`**Verdict:** APPROVE`. Address findings, re-invoke the " +
                "subagent, and post an updated review."
              );
              return;
            }

            core.info(`Code-reviewer APPROVE found at ${latest.html_url}`);
